<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Stronka (͠≖ ͜ʖ͠≖)👌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-theme">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <section id="overlay" onclick="toggleMenu()"></section>

    <nav id="sidebar" class="sidebar">
        <h2>Menu Powrotne</h2>
        <ul>
            <li><button onclick="showSection('home')">Home</button></li>
            <li><button onclick="showSection('ListaZakup')">ListaZakupów</button></li>
            <li><button onclick="showSection('Elden')">Mapa Elden Ring</button></li>
            <li><button onclick="showSection('Hollow')">Mapa Hollow Knight</button></li>
        </ul>
    </nav>

    <main>
        <section id="home" class="app-section active">
            <div class="home-header">
                <h1>𝓜𝓮𝓷𝓾</h1>
                <div class="header-line"></div>
            </div>
            
            <div class="launcher-container">
                <div class="launcher-card" onclick="showSection('Elden')">
                    <div class="card-image elden-img"></div>
                    <div class="card-content">
                        <h3>Elden Ring</h3>
                        <p>Interaktywna Mapa Elden Ring</p>
                    </div>
                </div>
                <section class="launcher-card" onclick="showSection('ListaZakup')">
                    <section class="card-image ListaZakup-img"></section>
                    <section class="card-content">
                        <h3>Lista Zakupów</h3>
                        <p>Zapisz se co tam trzeba</p>
                    </section>
                </section>
                <div class="launcher-card" onclick="showSection('Hollow')">
                    <div class="card-image hollow-img"></div>
                    <div class="card-content">
                        <h3>Hollow Knight</h3>
                        <p>Interaktywna Mapa Hollow Knight</p>
                    </div>
                </div>
            </div>
        </section>



        <section id="Elden" class="app-section">
            <section class="card" id="E-card">
                <h2 id="E-h2">Mapa Elden ring</h2>
                <section class="map" id="E-map">
                    <iframe src="https://mapgenie.io/elden-ring/maps/the-lands-between?embed=light" width="100%" height="100%" frameborder="0"></iframe>
                </section>
            </section>
        </section>


        <section id="ListaZakup" class="app-section">
            <section class="card" id="Z-card">
                <section class="shopping-list-container">
                    <h2>Lista Zakupów</h2>
                    <section class="input-group">
                        <input type="text" id="itemInput" placeholder="Dodaj przedmiot...">
                        <button onclick="addItem()">Dodaj</button>
                    </section>
                    <ul id="shoppingList"></ul>
                    <button class="clear-btn" onclick="clearList()">Wyczyść listę</button>
                </section>
            </section>
        </section>

        
        <section id="Hollow" class="app-section">
            <section class="card" id="H-card">
                <h2 id="H-h2">Mapa Hollow Knight</h2>
                <section class="map" id="H-map">
                    <iframe src="https://mapgenie.io/hollow-knight/maps/hallownest?embed=light" width="100%" height="100%" frameborder="0"></iframe>
                </section>
            </section>
        </section>

    </main>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(sectionId) {
        const sections = document.querySelectorAll('.app-section');
        const body = document.body;

        sections.forEach(sec => {
            sec.classList.remove('active');
            sec.style.display = "none";
        });

        body.classList.remove('home-theme', 'elden-theme', 'hollow-theme', 'elden-bg', 'hollow-bg');

        if (sectionId === 'Elden') {
            body.classList.add('elden-theme', 'elden-bg');
        } else if (sectionId === 'Hollow') {
            body.classList.add('hollow-theme', 'hollow-bg');
        } else {
            body.classList.add('home-theme');
        }

        const target = document.getElementById(sectionId);
        if(target) {
            target.classList.add('active');
            target.style.display = "block";
        }

        if (document.getElementById('sidebar').classList.contains('open')) {
            toggleMenu();
        }
    }
    document.addEventListener('DOMContentLoaded', loadList);

    function addItem() {
        const input = document.getElementById('itemInput');
        const text = input.value.trim();

        if (text !== "") {
            const item = {
                id: Date.now(),
                text: text,
                completed: false
            };
            saveItem(item);
            renderItem(item);
            input.value = "";
        }
    }

    function renderItem(item) {
        const ul = document.getElementById('shoppingList');
        const li = document.createElement('li');
        li.setAttribute('data-id', item.id);
        if (item.completed) li.classList.add('completed');

        li.innerHTML = `
            <span onclick="toggleComplete(${item.id})">${item.text}</span>
            <span class="delete-item" onclick="deleteItem(${item.id})">✕</span>
        `;
        ul.appendChild(li);
    }

    function toggleComplete(id) {
        let items = JSON.parse(localStorage.getItem('shoppingItems')) || [];
        items = items.map(item => {
            if (item.id === id) item.completed = !item.completed;
            return item;
        });
        localStorage.setItem('shoppingItems', JSON.stringify(items));
        refreshUI();
    }

    function deleteItem(id) {
        let items = JSON.parse(localStorage.getItem('shoppingItems')) || [];
        items = items.filter(item => item.id !== id);
        localStorage.setItem('shoppingItems', JSON.stringify(items));
        refreshUI();
    }

    function saveItem(item) {
        const items = JSON.parse(localStorage.getItem('shoppingItems')) || [];
        items.push(item);
        localStorage.setItem('shoppingItems', JSON.stringify(items));
    }

    function loadList() {
        const items = JSON.parse(localStorage.getItem('shoppingItems')) || [];
        items.forEach(renderItem);
    }

    function refreshUI() {
        document.getElementById('shoppingList').innerHTML = "";
        loadList();
    }

    function clearList() {
        localStorage.removeItem('shoppingItems');
        refreshUI();
    }

    document.getElementById('itemInput')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addItem();
    });
</script>
</body>
</html>
